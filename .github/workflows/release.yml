name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci
        env:
          SKIP_BUILD: true

      - run: npm run build

      - run: npm test

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi
          MAJOR=${VERSION%%.*}
          MINOR=${VERSION#*.}
          MINOR=${MINOR%%.*}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major }}
          labels: |
            org.opencontainers.image.title=synclounge
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Get tag message and changelog
        id: tag_message
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch --tags --force
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          TAG_MESSAGE=$(git tag -l --format='%(contents)' $CURRENT_TAG | head -c 100000)
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^$CURRENT_TAG$" | tail -1)
          if [ "$PREV_TAG" != "$CURRENT_TAG" ] && [ -n "$PREV_TAG" ]; then
            CHANGELOG_LINK="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
          else
            CHANGELOG_LINK="**Full Changelog**: https://github.com/${{ github.repository }}/commits/${CURRENT_TAG}"
          fi
          # Check if tag message has real content (not just the version string)
          STRIPPED=$(echo "$TAG_MESSAGE" | sed '/^$/d' | sed "s/^${CURRENT_TAG}$//" | sed '/^$/d')
          if [ -n "$STRIPPED" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "message<<EOF" >> $GITHUB_OUTPUT
            echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$CHANGELOG_LINK" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "message=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_message.outputs.has_notes == 'true' && steps.tag_message.outputs.message || '' }}
          generate_release_notes: ${{ steps.tag_message.outputs.has_notes != 'true' }}
